rootLogger.level=error
rootLogger.appenderRef.rolling.ref=RollingAppender

appender.rolling.type=RollingFile
appender.rolling.name=RollingAppender
appender.rolling.fileName=/usr/local/tomcat/logs/alfresco.log
appender.rolling.filePattern=/usr/local/tomcat/logs/alfresco.log.%d{yyyy-MM-dd}
appender.rolling.layout.type=PatternLayout
appender.rolling.layout.pattern=%d{ISO8601} %-5p [%c] [%t] %replace{%m}{[\r\n]+}{}%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1

logger.project.name=${project.artifactId}
logger.project.level=DEBUG

logger.client-five.name=org.apache.hc.client5.http
logger.client-five.level=DEBUG

logger.client-five-wire.name=org.apache.hc.client5.http.wire
logger.client-five-wire.level=DEBUG